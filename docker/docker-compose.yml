services:
  pool_sv2:
    image: stratumv2/pool_sv2:main
    container_name: pool_sv2
    stop_signal: SIGINT
    # The pool is configured entirely from POOL__* variables in docker_env;
    # there is no config file to mount.
    env_file:
      - docker_env
    volumes:
      - "${BITCOIN_SOCKET_PATH?}:/root/.bitcoin/node.sock"
    ports:
      - "3333:3333"
      - "3334:3334"
      - "127.0.0.1:9090:9090"  # Monitoring HTTP API & Prometheus metrics (localhost only)
    restart: unless-stopped
    profiles:
      - pool_and_miner_apps_no_jd
      - pool_apps
      - pool_and_miner_apps

  jd_client_sv2:
    image: stratumv2/jd_client_sv2:main
    container_name: jd_client_sv2
    stop_signal: SIGINT
    # Configured entirely from JDC__* variables in docker_env.
    env_file:
      - docker_env
    volumes:
      - "${BITCOIN_SOCKET_PATH?}:/root/.bitcoin/node.sock"
    ports:
      - "34265:34265"
      - "9091:9091"  # Monitoring HTTP API & Prometheus metrics
    restart: unless-stopped
    profiles:
      - miner_apps
      - pool_and_miner_apps

  tproxy_sv2:
    image: stratumv2/translator_sv2:main
    container_name: tproxy_sv2
    stop_signal: SIGINT
    # Configured entirely from TPROXY__* variables in docker_env.
    env_file:
      - docker_env
    ports:
      - "34255:34255"
      - "9092:9092"  # Monitoring HTTP API & Prometheus metrics
    restart: unless-stopped
    profiles:
      - pool_and_miner_apps_no_jd
      - tproxy
      - miner_apps
      - pool_and_miner_apps

networks:
  sv2_apps:
