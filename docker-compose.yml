services:
  bitcoind:
    image: fossatmara/bitcoind:v1
    container_name: bitcoind
    build:
      context: .
      dockerfile: bitcoind.Dockerfile
    ports:
      - "8332:8332"
      - "8333:8333"
      - "18332:18332"
      - "18333:18333"
    command:
      - "-m"
      - "node"
      - "-datadir=/root/.bitcoin"
      - "-printtoconsole"
      - "-regtest"
      - "-ipcbind=unix"
    volumes:
      - bitcoind_share:/root/.bitcoin

  pool:
    image: fossatmara/pool:v1
    container_name: pool
    build:
      context: .
      dockerfile: pool.Dockerfile
    # Environment variables override the matching fields in the image's baked
    # /app/pool-config.toml. The name is POOL__<FIELD>, with `__` separating
    # nested keys. (fee_threshold / min_interval live under a tagged-enum table
    # that cannot be addressed via env vars; set them in config/pool-config.toml.)
    environment:
      - POOL__COINBASE_REWARD_SCRIPT=addr(tb1qa0sm0hxzj0x25rh8gw5xlzwlsfvvyz8u96w3p8)
      - POOL__POOL_SIGNATURE=Stratum V2 SRI Pool
      - POOL__SHARES_PER_MINUTE=6.0
      - POOL__SHARE_BATCH_SIZE=10
    ports:
      - "3333:3333"
      - "3334:3334"
      - "9090:9090" # Monitoring HTTP API & Prometheus metrics (localhost only)
    volumes:
      - bitcoind_share:/root/.bitcoin

  tproxy:
    image: fossatmara/tproxy:v1
    container_name: tproxy
    build:
      context: .
      dockerfile: tproxy.Dockerfile
    # Environment variables override the matching fields in the image's baked
    # /app/translator-config.toml. The name is TPROXY__<FIELD>, with `__`
    # separating nested keys. (The upstream connection lives in an `[[upstreams]]`
    # list that cannot be addressed via env vars; set it in
    # config/translator-config.toml.)
    environment:
      - TPROXY__VERIFY_PAYOUT=false
      - TPROXY__AGGREGATE_CHANNELS=false
      - TPROXY__DOWNSTREAM_DIFFICULTY_CONFIG__MIN_INDIVIDUAL_MINER_HASHRATE=10000000000000.0
      - TPROXY__DOWNSTREAM_DIFFICULTY_CONFIG__SHARES_PER_MINUTE=6.0
      - TPROXY__DOWNSTREAM_DIFFICULTY_CONFIG__ENABLE_VARDIFF=true
    ports:
      - "34255:34255"
      - "9092:9092" # Monitoring HTTP API & Prometheus metrics

  jdc:
    image: fossatmara/jdc:v1
    container_name: jdc
    build:
      context: .
      dockerfile: jdc.Dockerfile
    # Environment variables override the matching fields in the image's baked
    # /app/jdc-config.toml. The name is JDC__<FIELD>, with `__` separating nested
    # keys. (The upstream Pool/JDS connection lives in an `[[upstreams]]` list and
    # fee_threshold / min_interval under a tagged-enum table; neither can be
    # addressed via env vars, so set them in config/jdc-config.toml.)
    environment:
      - JDC__SHARES_PER_MINUTE=6.0
      - JDC__SHARE_BATCH_SIZE=10
      - JDC__JDC_SIGNATURE=Sv2MinerSignature
      - JDC__COINBASE_REWARD_SCRIPT=addr(tb1qr8xjkrx46yfsch7q2ts2g007haufq48n9pe6qc)
    ports:
      - "34265:34265"
      - "9091:9091" # Monitoring HTTP API & Prometheus metrics

volumes:
  # used to share an ipc socket
  bitcoind_share:
    driver: local
