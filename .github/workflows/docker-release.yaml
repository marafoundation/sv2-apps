name: Build and Push Docker Images

on:
  push:
    branches:
      - mara

  release:
    types: [published]
  workflow_dispatch:

env:
  AWS_REGION: us-east-2
  ECR_REGISTRY: 047385673162.dkr.ecr.us-east-2.amazonaws.com

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: pool
            dockerfile: pool.Dockerfile
            platforms: linux/amd64,linux/arm64
          - image: jdc
            dockerfile: jdc.Dockerfile
            platforms: linux/amd64,linux/arm64
          - image: tproxy
            dockerfile: tproxy.Dockerfile
            platforms: linux/amd64,linux/arm64
          # bitcoind compiles Bitcoin Core + capnproto from source; arm64 under
          # QEMU emulation is prohibitively slow, so build amd64 only.
          - image: bitcoind
            dockerfile: bitcoind.Dockerfile
            platforms: linux/amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tags
        id: tags
        env:
          IMAGE: ${{ env.ECR_REGISTRY }}/${{ matrix.image }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            # Tagged releases publish under the git ref name (the version tag),
            # and :latest is moved to follow the newest release.
            {
              echo "tags<<EOF"
              echo "${IMAGE}:${{ github.ref_name }}"
              echo "${IMAGE}:latest"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            # Branch pushes and manual dispatch publish under the commit SHA so
            # devs can deploy a specific build without touching :latest.
            echo "tags=${IMAGE}:${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push multi-arch images
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          tags: ${{ steps.tags.outputs.tags }}
