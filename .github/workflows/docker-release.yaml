name: Build and Push Docker Images

on:
  push:
    branches:
      - mara

  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - image: pool
            dockerfile: pool.Dockerfile
            platforms: linux/amd64
          - image: jdc
            dockerfile: jdc.Dockerfile
            platforms: linux/amd64
          - image: tproxy
            dockerfile: tproxy.Dockerfile
            platforms: linux/amd64
          # bitcoind compiles Bitcoin Core + capnproto from source; arm64 under
          # QEMU emulation is prohibitively slow, so build amd64 only.
          - image: bitcoind
            dockerfile: bitcoind.Dockerfile
            platforms: linux/amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: stratumv2
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-arch images
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          file: docker/Dockerfile
          build-args: |
            APP=${{ matrix.app }}

          platforms: |
            linux/amd64
            linux/arm64

          tags: |
            stratumv2/${{ matrix.app }}:${{ github.ref_name }}
