name: Build and Push Docker Images

on:
  push:
    branches:
      - mara
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

  workflow_dispatch:

env:
  AWS_REGION: us-east-2
  ECR_REGISTRY: 047385673162.dkr.ecr.us-east-2.amazonaws.com

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # `rust: true` enables the cargo cache-mount persistence steps below.
          - image: pool
            dockerfile: pool.Dockerfile
            platforms: linux/amd64
            rust: true
          - image: jdc
            dockerfile: jdc.Dockerfile
            platforms: linux/amd64
            rust: true
          - image: tproxy
            dockerfile: tproxy.Dockerfile
            platforms: linux/amd64
            rust: true
          # bitcoind compiles Bitcoin Core + capnproto from source; arm64 under
          # QEMU emulation is prohibitively slow, so build amd64 only.
          - image: bitcoind
            dockerfile: bitcoind.Dockerfile
            platforms: linux/amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tags
        id: tags
        env:
          IMAGE: ${{ env.ECR_REGISTRY }}/${{ matrix.image }}
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            # Version-tag pushes publish under the git ref name (the version
            # tag), and :latest is moved to follow it.
            {
              echo "tags<<EOF"
              echo "${IMAGE}:${{ github.ref_name }}"
              echo "${IMAGE}:latest"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            # Branch pushes and manual dispatch publish under the commit SHA so
            # devs can deploy a specific build without touching :latest.
            echo "tags=${IMAGE}:${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          fi

      # Persist the cargo cache mounts (registry/git/compiled target dir) across
      # runs so a source change recompiles only what changed. Keyed on the
      # lockfiles: the cache is reused until a dependency version changes.
      # actions/cache is declared before the dance so its save (a post step) runs
      # after the dance extracts the mounts back out.
      - name: Restore cargo cache
        id: cargo-cache
        if: matrix.rust
        uses: actions/cache@v4
        with:
          path: cargo-cache
          key: cargo-cache-${{ matrix.image }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-cache-${{ matrix.image }}-

      - name: Inject cargo cache into Buildx
        if: matrix.rust
        uses: reproducible-containers/buildkit-cache-dance@v3
        with:
          builder: ${{ steps.buildx.outputs.name }}
          cache-map: |
            {
              "cargo-cache/registry": { "target": "/usr/local/cargo/registry", "id": "cargo-registry" },
              "cargo-cache/git": { "target": "/usr/local/cargo/git", "id": "cargo-git" },
              "cargo-cache/target": { "target": "/app/target", "id": "cargo-target" }
            }
          skip-extraction: ${{ steps.cargo-cache.outputs.cache-hit }}

      - name: Build and push multi-arch images
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          tags: ${{ steps.tags.outputs.tags }}
          # Layer cache stored in ECR (no GHA 10GB cap; biggest win for bitcoind,
          # which compiles Bitcoin Core + capnproto from source). ECR rejects the
          # default cache manifest type, so push it as an OCI image manifest.
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ matrix.image }}:buildcache,mode=max,image-manifest=true,oci-mediatypes=true
